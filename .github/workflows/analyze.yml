name: X-Flow Daily Analytics

on:
  schedule:
    # 每天 UTC 18:00 = 北京时间凌晨 02:00
    - cron: '0 18 * * *'
  # 支持手动触发（Dashboard → Actions → Run workflow）
  workflow_dispatch:
    inputs:
      dry_run:
        description: '是否为试运行（只分析不写回）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  analyze:
    name: 高光提取 + 协同过滤推荐
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 防止卡住无限计费

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'          # 缓存 pip 包，加速后续运行

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install httpx

      - name: 运行分析 Pipeline
        env:
          CF_ACCOUNT_ID:      ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:       ${{ secrets.CF_API_TOKEN }}
          CF_D1_DB_ID:        ${{ secrets.CF_D1_DB_ID }}
          WORKER_URL:         ${{ secrets.WORKER_URL }}
          WORKER_TOKEN_SALT:  ${{ secrets.WORKER_TOKEN_SALT }}
          DRY_RUN:            ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/analyze.py

      - name: 上传运行日志（可选，保留 7 天）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyze-log-${{ github.run_id }}
          path: /tmp/xflow-analyze*.log
          retention-days: 7
          if-no-files-found: ignore
