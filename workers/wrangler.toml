name = "xflow-telemetry"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── 自定义域名配置 ───────────────────────────────────────────────
routes = [
  { pattern = "telemetry.x-flow.ccwu.cc", custom_domain = true }
]

# ── D1 数据库绑定 ──────────────────────────────────────────────
[[d1_databases]]
binding  = "DB"
database_name = "xflow-telemetry"
database_id   = "27b1637f-9f46-4cdf-9059-20248c39638c"   # wrangler d1 create xflow-telemetry

# ── 部署命令参考 ───────────────────────────────────────────────
# 1. 创建 D1:  wrangler d1 create xflow-telemetry
# 2. 初始化表:  wrangler d1 execute xflow-telemetry --file=schema.sql
# 3. 部署:     wrangler deploy
# 4. 测试:     curl https://xflow-telemetry.chen-m1108.workers.dev/api/ping
